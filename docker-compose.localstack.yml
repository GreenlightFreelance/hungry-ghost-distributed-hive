services:
  localstack:
    image: localstack/localstack:3.4
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      SERVICES: dynamodb,sqs,events,s3,secretsmanager,ecs,iam,logs
      DEFAULT_REGION: af-south-1
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  setup:
    image: amazon/aws-cli:2.15.0
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_DEFAULT_REGION: af-south-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    entrypoint: /bin/sh
    command:
      - -c
      - |
        # Create DynamoDB table
        aws --endpoint-url=http://localstack:4566 dynamodb create-table \
          --table-name distributed-hive-state \
          --attribute-definitions \
            AttributeName=PK,AttributeType=S \
            AttributeName=SK,AttributeType=S \
            AttributeName=GSI1PK,AttributeType=S \
            AttributeName=GSI1SK,AttributeType=S \
            AttributeName=GSI2PK,AttributeType=S \
            AttributeName=GSI2SK,AttributeType=S \
          --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --global-secondary-indexes \
            '[{"IndexName":"userId-index","KeySchema":[{"AttributeName":"GSI1PK","KeyType":"HASH"},{"AttributeName":"GSI1SK","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}},{"IndexName":"status-index","KeySchema":[{"AttributeName":"GSI2PK","KeyType":"HASH"},{"AttributeName":"GSI2SK","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}}]'

        # Create SQS queues
        aws --endpoint-url=http://localstack:4566 sqs create-queue \
          --queue-name distributed-hive-runs-dlq
        DLQ_ARN=$$(aws --endpoint-url=http://localstack:4566 sqs get-queue-attributes \
          --queue-url http://sqs.af-south-1.localhost.localstack.cloud:4566/000000000000/distributed-hive-runs-dlq \
          --attribute-names QueueArn --query 'Attributes.QueueArn' --output text)
        aws --endpoint-url=http://localstack:4566 sqs create-queue \
          --queue-name distributed-hive-runs \
          --attributes "{\"VisibilityTimeout\":\"900\",\"MessageRetentionPeriod\":\"1209600\",\"RedrivePolicy\":\"{\\\"deadLetterTargetArn\\\":\\\"$$DLQ_ARN\\\",\\\"maxReceiveCount\\\":3}\"}"

        # Create EventBridge bus
        aws --endpoint-url=http://localstack:4566 events create-event-bus \
          --name distributed-hive-events

        # Create S3 bucket for frontend
        aws --endpoint-url=http://localstack:4566 s3 mb s3://distributed-hive-frontend

        # Create secrets
        aws --endpoint-url=http://localstack:4566 secretsmanager create-secret \
          --name hive/anthropic-api-key --secret-string "$${ANTHROPIC_API_KEY:-sk-test-key}"
        aws --endpoint-url=http://localstack:4566 secretsmanager create-secret \
          --name hive/github-token --secret-string "$${GITHUB_TOKEN:-ghp-test-token}"

        echo "LocalStack setup complete!"

  hive:
    build:
      context: .
      dockerfile: infra/Dockerfile
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      LOCAL_MODE: "true"
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_DEFAULT_REGION: af-south-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      ANTHROPIC_KEY_ARN: hive/anthropic-api-key
      GITHUB_TOKEN_ARN: hive/github-token
      RUN_ID: ${RUN_ID:-local-run-001}
      DYNAMODB_TABLE: distributed-hive-state
      EVENTBRIDGE_BUS: distributed-hive-events
      REPO_URLS: ${REPO_URLS:-[]}
      REQUIREMENT_TITLE: ${REQUIREMENT_TITLE:-Local test run}
      REQUIREMENT_DESCRIPTION: ${REQUIREMENT_DESCRIPTION:-Testing the distributed hive locally}
      HIVE_CONFIG_OVERRIDE: ${HIVE_CONFIG_OVERRIDE:-}
    volumes:
      - hive-workspace:/workspace
      - hive-agent-logs:/opt/hive/logs
    restart: unless-stopped

volumes:
  localstack-data:
  hive-workspace:
  hive-agent-logs:
